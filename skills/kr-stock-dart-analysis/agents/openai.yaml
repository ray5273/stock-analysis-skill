interface:
  display_name: "Korean DART Analysis"
  short_description: "한국 DART 공시에서 실적, 사업부문, 수주계약 등 핵심 내용을 근거 중심으로 추출합니다."
  default_prompt: "Use $kr-stock-dart-analysis to extract a precise, source-mapped filing analysis for a KRX-listed company. Treat it as the filing-precision stage inside the `kr-stock-plan -> kr-stock-dart-analysis -> kr-stock-data-pack -> kr-stock-analysis` workflow. Default to Korean for all user-facing output unless the user explicitly asks for English. Start by checking whether the user's filing need is already clear; if not, ask the shortest questions needed to confirm the filing scope, target period, and whether this is filing-only output or an input to a broader memo. DART-first is mandatory for note-driven annual work: if the request depends on customer concentration, geography mix, related-party or internal-group revenue, segment margin, treasury-share detail, or another annual-note claim, open the DART filing and the attached audit or review report first and do not use company IR pages as a substitute. You may use a company IR audit-report download page only as an alternate route to the same official attached PDF. Then determine consolidated versus separate and cumulative versus standalone-quarter basis before quoting numbers, derive standalone quarter figures only when needed and label them as derived, and summarize only what the filing actually discloses about revenue, operating profit, segments, geography, customers, backlog, capex, related-party items, single-sales or supply-contract disclosures, and filing-stated reasons for change. If a note-driven item remains incomplete after a real DART read, mark it as unresolved rather than filling the gap from company-site summaries. If the user asks for contract disclosures only, use the fixed Korean contract-list format with the exact section order and keep original notices and amended status visible. Keep a clear source map and hand off cleanly to $kr-stock-data-pack or $kr-stock-analysis when broader interpretation is needed."

policy:
  allow_implicit_invocation: true
