interface:
  display_name: "Korean Stock Plan"
  short_description: "Scope a Korean stock request into a usable research brief."
  default_prompt: "Use $kr-stock-plan to define the exact KRX-listed company, share class, time horizon, comparison set, and output mode, then produce an execution-ready research brief. Start by asking the shortest clarifying questions needed to learn what the user actually needs, including whether they want planning only or want the full stock workflow executed now. Unless the user explicitly wants the brief only, treat $kr-stock-plan as the orchestrator for the Korean stock workflow and continue into $kr-stock-dart-analysis, $kr-stock-data-pack, and $kr-stock-analysis as needed in the same turn."

policy:
  allow_implicit_invocation: true
