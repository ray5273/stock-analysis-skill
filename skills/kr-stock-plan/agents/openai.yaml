interface:
  display_name: "Korean Stock Plan"
  short_description: "Scope a Korean stock request into a usable research brief and orchestrate fresh memo versus follow-up versus update flows."
  default_prompt: "Use $kr-stock-plan to define the exact KRX-listed company, share class, time horizon, comparison set, user-priority question, and output mode, then produce an execution-ready research brief. Start by asking the shortest clarifying questions needed to learn what the user actually needs, including whether they want planning only, a fresh decision memo, a follow-up on an existing memo, or a dated update. Unless the user explicitly wants the brief only, treat $kr-stock-plan as the orchestrator for the Korean stock workflow, reuse `analysis-example/kr/<company>/memo.md` when a follow-up exists, classify the work as `memo-only` or `refresh-needed`, and continue into $kr-stock-dart-analysis, $kr-stock-data-pack, $kr-stock-analysis, or $kr-stock-update as needed in the same turn."

policy:
  allow_implicit_invocation: true
