interface:
  display_name: "Korean Stock Analysis"
  short_description: "Analyze KRX-listed companies with DART, valuation, governance checks, chart context, street views, and full-memo follow-up research questions."
  default_prompt: "Use $kr-stock-analysis to prepare a dated output for a KRX-listed company. Match the requested mode (`quick view`, `full memo`, `pre-earnings note`, `post-earnings note`, or `pair compare`). Anchor material numbers and formal facts to primary sources such as DART, KRX, filings, and official IR, but do not stop at company materials when outside debate is available. For `full memo` outputs, include thesis, latest results, a `Street / Alternative Views` section that blends sell-side, specialist-media, or independent analysis with clear source-role labels, valuation, governance checks, catalysts, risks, chart context, and additional follow-up research questions, and write or update analysis-example/kr/<company>.md when the workspace is writable."

policy:
  allow_implicit_invocation: true
