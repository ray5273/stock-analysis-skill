name: Validate Skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate skill files
        shell: pwsh
        run: .\scripts\validate-skills.ps1
